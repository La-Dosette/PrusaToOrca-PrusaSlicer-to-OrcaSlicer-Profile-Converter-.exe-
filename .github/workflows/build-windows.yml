name: Build Windows exe

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/safe-orca-import

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller tkinterdnd2
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Build exe
        shell: pwsh
        run: .\build_exe.ps1
      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: PrusaToOrca-v0.2.0-windows
          path: dist/PrusaToOrca.exe
